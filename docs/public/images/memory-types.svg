<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450">
  <defs>
    <linearGradient id="declarativeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nonDeclarativeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="episodicGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="semanticGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fb923c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="proceduralGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ltmGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="600" height="450" fill="#f8fafc" rx="12"/>
  
  <!-- 标题 -->
  <text x="300" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#1e293b" font-weight="700">长时记忆的分类结构</text>
  
  <!-- 长时记忆 - 根节点 -->
  <rect x="200" y="50" width="200" height="50" rx="10" fill="url(#ltmGrad)"/>
  <text x="300" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="white" font-weight="600">长时记忆</text>
  <text x="300" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">LONG-TERM MEMORY</text>
  
  <!-- 陈述性记忆 -->
  <rect x="60" y="150" width="180" height="50" rx="10" fill="url(#declarativeGrad)"/>
  <text x="150" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="white" font-weight="600">陈述性记忆</text>
  <text x="150" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.9)">DECLARATIVE MEMORY</text>
  
  <!-- 非陈述性记忆 -->
  <rect x="360" y="150" width="180" height="50" rx="10" fill="url(#nonDeclarativeGrad)"/>
  <text x="450" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="white" font-weight="600">非陈述性记忆</text>
  <text x="450" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.9)">NON-DECLARATIVE</text>
  
  <!-- 情景记忆 -->
  <rect x="30" y="260" width="120" height="80" rx="10" fill="url(#episodicGrad)"/>
  <text x="90" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="white" font-weight="600">情景记忆</text>
  <text x="90" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.9)">EPISODIC</text>
  <text x="90" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">个人经历</text>
  <text x="90" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">时间地点事件</text>
  
  <!-- 语义记忆 -->
  <rect x="165" y="260" width="120" height="80" rx="10" fill="url(#semanticGrad)"/>
  <text x="225" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="white" font-weight="600">语义记忆</text>
  <text x="225" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.9)">SEMANTIC</text>
  <text x="225" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">知识概念</text>
  <text x="225" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">事实原理</text>
  
  <!-- 程序性记忆 -->
  <rect x="390" y="260" width="120" height="80" rx="10" fill="url(#proceduralGrad)"/>
  <text x="450" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="white" font-weight="600">程序性记忆</text>
  <text x="450" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.9)">PROCEDURAL</text>
  <text x="450" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">技能习惯</text>
  <text x="450" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">骑自行车打字</text>
  
  <!-- 连接线 -->
  <line x1="250" y1="100" x2="150" y2="150" stroke="#64748b" stroke-width="2"/>
  <line x1="350" y1="100" x2="450" y2="150" stroke="#64748b" stroke-width="2"/>
  <line x1="150" y1="200" x2="90" y2="260" stroke="#64748b" stroke-width="2"/>
  <line x1="150" y1="200" x2="225" y2="260" stroke="#64748b" stroke-width="2"/>
  <line x1="450" y1="200" x2="450" y2="260" stroke="#64748b" stroke-width="2"/>
  
  <!-- 示例说明 -->
  <rect x="30" y="370" width="540" height="60" rx="8" fill="#f1f5f9"/>
  <text x="50" y="395" font-family="system-ui, sans-serif" font-size="11" fill="#475569">💡 示例：</text>
  <text x="50" y="415" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">• 情景记忆：你记得第一次上台演讲的场景</text>
  <text x="240" y="415" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">• 语义记忆：你知道TCP三次握手的原理</text>
  <text x="430" y="415" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">• 程序性记忆：你会骑自行车</text>
</svg>
