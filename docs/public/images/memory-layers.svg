<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="sensoryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="workingGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="longTermGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="600" height="400" fill="#f8fafc" rx="12"/>
  
  <!-- 标题 -->
  <text x="300" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#1e293b" font-weight="700">记忆的分层结构</text>
  
  <!-- 感觉记忆 -->
  <rect x="50" y="60" width="140" height="80" rx="10" fill="url(#sensoryGrad)"/>
  <text x="120" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="white" font-weight="600">感觉记忆</text>
  <text x="120" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">(极短暂)</text>
  <text x="120" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">视觉后像 · 声像</text>
  
  <!-- 工作记忆 -->
  <rect x="230" y="150" width="140" height="80" rx="10" fill="url(#workingGrad)"/>
  <text x="300" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="white" font-weight="600">工作记忆</text>
  <text x="300" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">(容量有限)</text>
  <text x="300" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">思考 · 推理 · 理解</text>
  
  <!-- 长时记忆 -->
  <rect x="410" y="240" width="140" height="100" rx="10" fill="url(#longTermGrad)"/>
  <text x="480" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="white" font-weight="600">长时记忆</text>
  <text x="480" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">(巨大但分布式)</text>
  <text x="480" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">知识 · 经历 · 技能</text>
  
  <!-- 箭头和标签 -->
  <path d="M120 140 L120 180 L225 185" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>
  <text x="80" y="165" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">信息筛选</text>
  
  <path d="M300 230 L300 270 L405 290" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>
  <text x="330" y="265" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">反复激活</text>
  
  <path d="M410 310 L300 320 L180 260 L180 200" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5" marker-end="url(#arrow2)"/>
  <text x="260" y="355" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">提取激活</text>
  
  <!-- 容量指示 -->
  <rect x="50" y="350" width="500" height="8" rx="4" fill="#e2e8f0"/>
  <rect x="50" y="350" width="50" height="8" rx="4" fill="url(#sensoryGrad)"/>
  <rect x="50" y="350" width="100" height="8" rx="4" fill="url(#workingGrad)"/>
  <rect x="50" y="350" width="500" height="8" rx="4" fill="url(#longTermGrad)"/>
  
  <text x="100" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">容量示意</text>
</svg>
